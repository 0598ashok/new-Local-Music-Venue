  <style>
    /* Dashboard Layout */
    .dashboard-layout { display: flex; min-height: 100vh; position: relative; }
    
    /* Sidebar - Always visible on desktop */
    .dashboard-sidebar { 
      width: 260px; 
      background: var(--bg-card); 
      border-right: 1px solid var(--border); 
      position: fixed; 
      height: 100vh; 
      overflow-y: auto; 
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Sidebar Overlay */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .sidebar-overlay.active {
      display: block;
      opacity: 1;
    }
    
    /* Main Content */
    .dashboard-main { 
      flex: 1; 
      margin-left: 260px; 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: calc(100% - 260px);
    }
    
    /* Premium Dashboard Enhancements */
    .navbar-brand-icon {
      background: linear-gradient(135deg, #ec4899 0%, #7c3aed 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: #ec4899;
      color: white;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--text-sm);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(236, 72, 153, 0.2);
    }
    
    .user-name {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text);
      line-height: 1.2;
    }
    
    .user-role {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    
    .navbar-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
      transition: all 0.2s ease;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
    }
    
    .navbar-btn:hover { background: var(--bg-secondary); color: var(--text); }

    @media (max-width: 640px) {
      .dashboard-header { padding: 0 var(--space-4); }
      .user-menu { gap: var(--space-2); }
      #rtlToggle { padding: 0 var(--space-2) !important; font-size: 12px !important; width: auto; }
      .user-info { display: none; }
    }

    /* Page Header */
    .dashboard-header { 
      height: 70px; 
      background: var(--bg-card); 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 var(--space-6); 
      position: sticky; 
      top: 0; 
      z-index: 50; 
    }
    
    .dashboard-content { 
      flex: 1;
      padding: var(--space-8); 
      background: var(--bg);
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* Sidebar Navigation */
    .dashboard-nav { padding: var(--space-2); }
    
    .dashboard-nav-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-4) var(--space-4) var(--space-2);
      margin-top: var(--space-2);
    }
    
    .dashboard-nav-link { 
      display: flex; 
      align-items: center; 
      gap: var(--space-3); 
      padding: var(--space-3) var(--space-4); 
      border-radius: var(--radius-lg); 
      color: var(--text-secondary); 
      font-weight: 500;
      font-size: var(--text-sm);
      transition: all 0.2s ease;
      margin-bottom: var(--space-1);
    }
    
    .dashboard-nav-link:hover { 
      background: var(--bg-secondary);
      color: var(--text);
    }
    
    .dashboard-nav-link.active { 
      background: var(--primary-light);
      color: var(--primary);
    }
    
    .dashboard-nav-link svg { 
      width: 18px; 
      height: 18px; 
      flex-shrink: 0;
    }
    
    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: var(--space-8);
      margin-bottom: var(--space-8);
    }
    
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      border: 1px solid var(--border);
    }
    
    /* Page Title */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
      flex-wrap: wrap;
    }
    
    .page-title h1 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-1);
    }
    
    .page-title p {
      color: var(--text-muted);
      margin: 0;
    }
    
    /* Form Elements */
    .form-group {
      margin-bottom: var(--space-4);
    }
    
    .form-label {
      display: block;
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }
    
    .form-input {
      width: 100%;
      padding: var(--space-3);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: var(--text-sm);
    }
    
    /* Responsive Adjustments */
    @media (max-width: 1024px) {
      .dashboard-sidebar { 
        transform: translateX(-100%); 
      }
      .dashboard-sidebar.open { 
        transform: translateX(0); 
      }
      .dashboard-main { 
        margin-left: 0; 
        width: 100%;
      }
      .sidebar-toggle {
        display: flex;
      }
      .user-info { display: none; }
    }
    
    @media (max-width: 768px) {
      .dashboard-header {
        padding: 0 var(--space-4);
      }
      .dashboard-content {
        padding: var(--space-4);
      }
      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .content-grid {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 480px) {
      .card {
        padding: var(--space-4);
      }
    }

  </style>

  <script>
    // Mobile sidebar toggle
    const sidebar = document.getElementById('dashboardSidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggle = document.getElementById('sidebarToggle');

    function toggleSidebar() {
      sidebar?.classList.toggle('open');
      overlay?.classList.toggle('active');
      document.body.style.overflow = sidebar?.classList.contains('open') ? 'hidden' : '';
    }

    toggle?.addEventListener('click', toggleSidebar);
    overlay?.addEventListener('click', toggleSidebar);

    // Close sidebar on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sidebar?.classList.contains('open')) {
        toggleSidebar();
      }
    });

    // Handle window resize
    window.addEventListener('resize', () => {
      if (window.innerWidth > 1024 && sidebar?.classList.contains('open')) {
        toggleSidebar();
      }
    });
  </script>
