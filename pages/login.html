<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | The SoundBox - Access Your Account</title>
  <meta name="description"
    content="Log in to your The SoundBox account to manage your tickets, view loyalty points, and stay updated with upcoming shows.">

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2'%3E%3Cpath d='M9 18V5l12-2v13'/%3E%3Ccircle cx='6' cy='18' r='3'/%3E%3Ccircle cx='18' cy='16' r='3'/%3E%3C/svg%3E">

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .auth-page {
      height: 100vh;
      /* overflow-y: auto; */
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      position: relative;
    }

    .auth-page::-webkit-scrollbar {
      display: none;
    }

    .auth-page::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.1;
      top: -250px;
      right: -250px;
      border-radius: 50%;
    }

    .auth-page::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--secondary);
      filter: blur(150px);
      opacity: 0.1;
      bottom: -250px;
      left: -250px;
      border-radius: 50%;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      position: relative;
      z-index: 10;
    }

    .auth-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 450px;
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-2xl);
      border: 1px solid var(--border);
      position: relative;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-display);
      font-weight: var(--font-bold);
      color: var(--primary);
      font-size: var(--text-2xl);
      margin-bottom: var(--space-4);
      text-decoration: none;
    }

    .auth-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--text);
      margin-bottom: var(--space-2);
    }

    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .social-auth {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text);
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-social:hover {
      background: var(--bg-secondary);
      border-color: var(--border-dark);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
      margin-bottom: var(--space-8);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider:not(:empty)::before {
      margin-right: .5em;
    }

    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-toggle {
      position: absolute;
      right: var(--space-3);
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: var(--space-1);
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .auth-footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--primary);
      font-weight: var(--font-semibold);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive Adjustments */
    @media (max-width: 640px) {
      .auth-page {
        padding: var(--space-4);
      }

      .auth-card {
        padding: var(--space-6);
        border-radius: var(--radius-xl);
      }
    }

    @media (max-width: 400px) {
      .social-auth {
        grid-template-columns: 1fr;
      }

      .auth-title {
        font-size: var(--text-xl);
      }
    }
  </style>
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          The SoundBox
        </a>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Please enter your details to sign in</p>
      </div>

      <div class="social-auth">
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
            </path>
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
            </path>
            <path fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z">
            </path>
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
            </path>
          </svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
            </path>
          </svg>
          Facebook
        </button>
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.96.95-2.04 1.78-3.14 1.74-1.09-.04-1.44-.71-2.7-.71-1.25 0-1.66.69-2.7.73-1.04.04-2.15-.81-3.11-1.76-2.01-1.92-3.52-5.4-3.52-8.31 0-4.6 2.92-7.05 5.67-7.05 1.47 0 2.87.91 3.77.91.91 0 2.58-1.09 4.31-.91 1.05.04 4.01.42 5.92 3.22-.16.1-.31.19-.46.28-1.74 1.05-2.88 2.85-2.88 4.79S19.54 13.1 21.2 14.15l.43.27c-1.16 2.58-2.62 4.91-4.58 5.86zM14.97 3.03c.8-1.05 1.34-2.52 1.19-3.99-1.34.05-3.01.91-3.97 2.07-.9.99-1.55 2.58-1.34 3.99 1.42.06 2.9-.84 4.12-2.07z"/>
          </svg>
          Apple
        </button>
      </div>

      <div class="divider">or sign in with email</div>

      <form id="loginForm" action="dashboard-user.html" method="GET">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          <div class="error-msg" id="emailError"
            style="color: var(--error); font-size: 11px; margin-top: 4px; display: none;">Please enter a valid email.
          </div>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" style="padding-right: var(--space-10);" placeholder="" required>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg id="eyeOffIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
          <div class="error-msg" id="passwordError"
            style="color: var(--error); font-size: 11px; margin-top: 4px; display: none;">Password must be at least 8
            characters.</div>
        </div>

        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
          <div style="display: flex; align-items: center; gap: var(--space-2);">
            <input type="checkbox" id="remember" style="width: 16px; height: 16px; accent-color: var(--primary);">
            <label for="remember" class="form-label" style="margin-bottom: 0; font-weight: var(--font-normal);">Remember
              Me</label>
          </div>
          <a href="#" style="font-size: var(--text-xs); color: var(--primary); text-decoration: none;">Forgot
            password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding: var(--space-3); width: 100%;">Sign in to
          account</button>
      </form>

      <div class="auth-footer">
        Don't have an account yet? <a href="signup.html">Sign up here</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      let isValid = true;

      // Reset errors
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
      }

      // Password validation
      if (password.length < 8) {
        document.getElementById('passwordError').style.display = 'block';
        isValid = false;
      }

      if (isValid) {
        // Mock success - navigate to dashboard
        window.location.href = 'dashboard-user.html';
      }
    });

    // Password visibility toggle
    const passwordToggle = document.getElementById('passwordToggle');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    passwordToggle.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if (type === 'password') {
        eyeIcon.style.display = 'block';
        eyeOffIcon.style.display = 'none';
      } else {
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = 'block';
      }
    });
  </script>
</body>

</html>
