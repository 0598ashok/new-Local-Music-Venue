<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | The SoundBox - Access Your Account</title>
  <meta name="description" content="Log in to your The SoundBox account to manage your tickets, view loyalty points, and stay updated with upcoming shows.">
  
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2'%3E%3Cpath d='M9 18V5l12-2v13'/%3E%3Ccircle cx='6' cy='18' r='3'/%3E%3Ccircle cx='18' cy='16' r='3'/%3E%3C/svg%3E">
  
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      position: relative;
    }
    
    .auth-page::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.1;
      top: -250px;
      right: -250px;
      border-radius: 50%;
    }
    
    .auth-page::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--secondary);
      filter: blur(150px);
      opacity: 0.1;
      bottom: -250px;
      left: -250px;
      border-radius: 50%;
    }
    
    .auth-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 450px;
      padding: var(--space-10);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-2xl);
      border: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-display);
      font-weight: var(--font-bold);
      color: var(--primary);
      font-size: var(--text-2xl);
      margin-bottom: var(--space-4);
      text-decoration: none;
    }
    
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--text);
      margin-bottom: var(--space-2);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }
    
    .social-auth {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      border: 1px solid var(--border);
      background: transparent;
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      color: var(--text);
      transition: all 0.2s;
      cursor: pointer;
    }
    
    .btn-social:hover {
      background: var(--bg-secondary);
      border-color: var(--border-dark);
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
      margin-bottom: var(--space-8);
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }
    
    .form-group {
      margin-bottom: var(--space-5);
    }
    
    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text);
      margin-bottom: var(--space-2);
    }
    
    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .auth-footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    
    .auth-footer a {
      color: var(--primary);
      font-weight: var(--font-semibold);
      text-decoration: none;
    }
    
    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive Adjustments */
    @media (max-width: 640px) {
      .auth-page {
        padding: var(--space-4);
      }
      
      .auth-card {
        padding: var(--space-6);
        border-radius: var(--radius-xl);
      }
    }

    @media (max-width: 400px) {
      .social-auth {
        grid-template-columns: 1fr;
      }
      
      .auth-title {
        font-size: var(--text-xl);
      }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        The SoundBox
      </a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Please enter your details to sign in</p>
    </div>
    
    <div class="social-auth">
      <button class="btn-social">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
        </svg>
        Google
      </button>
      <button class="btn-social">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
        </svg>
        Facebook
      </button>
    </div>
    
    <div class="divider">or sign in with email</div>
    
    <form id="loginForm" action="dashboard-user.html" method="GET">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
        <div class="error-msg" id="emailError" style="color: var(--error); font-size: 11px; margin-top: 4px; display: none;">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
          <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
          <a href="#" style="font-size: var(--text-xs); color: var(--primary); text-decoration: none;">Forgot password?</a>
        </div>
        <input type="password" id="password" class="form-input" placeholder="" required>
        <div class="error-msg" id="passwordError" style="color: var(--error); font-size: 11px; margin-top: 4px; display: none;">Password must be at least 8 characters.</div>
      </div>
      
      <div class="form-group" style="display: flex; align-items: center; gap: var(--space-2);">
        <input type="checkbox" id="remember" style="width: 16px; height: 16px; accent-color: var(--primary);">
        <label for="remember" class="form-label" style="margin-bottom: 0; font-weight: var(--font-normal);">Remember and keep me logged in</label>
      </div>
      
      <button type="submit" class="btn btn-primary w-full" style="padding: var(--space-3); width: 100%;">Sign in to account</button>
    </form>
    
    <div class="auth-footer">
      Don't have an account yet? <a href="signup.html">Sign up here</a>
    </div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      let isValid = true;
      
      // Reset errors
      document.getElementById('emailError').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
      }
      
      // Password validation
      if (password.length < 8) {
        document.getElementById('passwordError').style.display = 'block';
        isValid = false;
      }
      
      if (isValid) {
        // Mock success - navigate to dashboard
        window.location.href = 'dashboard-user.html';
      }
    });
  </script>
</body>
</html>
