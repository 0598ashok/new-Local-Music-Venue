<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard user settings - The SoundBox</title>
  <meta name="description" content="Learn more about dashboard-user-settings at The SoundBox, the city's top music destination.">
  
  <!-- Local Fonts Loaded via style.css -->
  
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <style>
    /* Dashboard Layout */
    .dashboard-layout { display: flex; min-height: 100vh; }
    
    /* Sidebar - Always visible on desktop */
    .dashboard-sidebar { 
      width: 260px; 
      background: var(--bg-card); 
      border-right: 1px solid var(--border); 
      position: fixed; 
      height: 100vh; 
      overflow-y: auto; 
      z-index: 100;
      transition: transform 0.3s ease;
    }
    
    /* Main Content */
    .dashboard-main { 
      flex: 1; 
      margin-left: 260px; 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .dashboard-header { 
      height: 70px; 
      background: var(--bg-card); 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 var(--space-6); 
      position: sticky; 
      top: 0; 
      z-index: 50; 
    }
    
    .dashboard-content { 
      flex: 1;
      padding: var(--space-8); 
      background: var(--bg);
    }
    
    /* Sidebar Navigation */
    .dashboard-nav { padding: var(--space-2); }
    
    .dashboard-nav-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-4) var(--space-4) var(--space-2);
      margin-top: var(--space-2);
    }
    
    .dashboard-nav-link { 
      display: flex; 
      align-items: center; 
      gap: var(--space-3); 
      padding: var(--space-3) var(--space-4); 
      border-radius: var(--radius-lg); 
      color: var(--text-secondary); 
      font-weight: 500;
      font-size: var(--text-sm);
      transition: all 0.2s ease;
      margin-bottom: var(--space-1);
    }
    
    .dashboard-nav-link:hover { 
      background: var(--bg-secondary);
      color: var(--text);
    }
    
    .dashboard-nav-link.active { 
      background: var(--primary-light);
      color: var(--primary);
    }
    
    .dashboard-nav-link svg { 
      width: 18px; 
      height: 18px; 
      flex-shrink: 0;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }
    
    .stat-card { 
      background: var(--bg-card); 
      border-radius: var(--radius-xl); 
      padding: var(--space-6); 
      border: 1px solid var(--border);
    }
    
    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
    
    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .stat-icon.purple { background: var(--primary-light); color: var(--primary); }
    .stat-icon.gold { background: var(--accent-light); color: var(--accent-dark); }
    .stat-icon.green { background: var(--success-light); color: var(--success); }
    .stat-icon.pink { background: var(--secondary-light); color: var(--secondary); }
    
    .stat-value { 
      font-size: var(--text-3xl); 
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    
    .stat-label { 
      font-size: var(--text-sm); 
      color: var(--text-muted);
      margin-top: var(--space-1);
    }
    
    .stat-change {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-xs);
      margin-top: var(--space-2);
    }
    
    .stat-change.positive { color: var(--success); }
    .stat-change.negative { color: var(--error); }
    
    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-8);
    }
    
    /* Ticket Card */
    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    
    .ticket-card { 
      background: var(--bg-card); 
      border-radius: var(--radius-xl); 
      border: 1px solid var(--border); 
      overflow: hidden;
      display: flex;
      transition: all 0.2s ease;
    }
    
    .ticket-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--border-dark);
    }
    
    .ticket-info {
      flex: 1;
      padding: var(--space-5);
    }
    
    .ticket-qr { 
      background: var(--bg-secondary); 
      padding: var(--space-5);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }
    
    .ticket-qr-box {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Loyalty Card */
    .loyalty-widget {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      color: white;
    }
    
    .loyalty-progress-ring {
      width: 100px;
      height: 100px;
      margin: 0 auto var(--space-4);
    }
    
    .loyalty-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }
    
    .loyalty-stat {
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
    }
    
    .loyalty-stat-value {
      font-size: var(--text-xl);
      font-weight: 700;
    }
    
    .loyalty-stat-label {
      font-size: var(--text-xs);
      opacity: 0.7;
    }
    
    /* Page Title */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }
    
    .page-title h1 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-1);
    }
    
    .page-title p {
      color: var(--text-muted);
      margin: 0;
    }
    
    /* User Menu */
    .user-menu {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: var(--text-sm);
    }
    
    .user-info {
      line-height: 1.3;
    }
    
    .user-name {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text);
    }
    
    .user-role {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    
    /* Mobile Sidebar Toggle - Only visible on mobile */
    .sidebar-toggle {
      display: none;
    }
    
    /* Responsive */
    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content-grid { grid-template-columns: 1fr; }
    }
    
    @media (max-width: 1024px) {
      .dashboard-sidebar { 
        transform: translateX(-100%); 
      }
      .dashboard-sidebar.open { 
        transform: translateX(0); 
      }
      .dashboard-main { 
        margin-left: 0; 
      }
      .sidebar-toggle {
        display: flex;
      }
      .stats-grid { grid-template-columns: 1fr; }
      .user-info { display: none; }
    }
  </style>

      <!-- Content -->

                <!-- Page Header -->
        <div class="page-header">
          <div class="page-title">
            <h1>Settings</h1>
            <p>Manage your settings</p>
          </div>
        </div>
        <div class="content-grid">
          <div class="card">
            <div class="card-header">
              <h3>Profile Information</h3>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Full Name</label>

              </div>
              <div class="form-group">

              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>

              </label>
              <label class="form-check mb-4">
