<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coming soon - The SoundBox</title>
  <meta name="description" content="Learn more about coming-soon at The SoundBox, the city's top music destination.">
  
  <!-- Local Fonts Loaded via style.css -->
  
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <style>
    .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); max-width: 500px; margin: 0 auto var(--space-8); }
    .countdown-item { background: var(--bg-card); border-radius: var(--radius-xl); padding: var(--space-6); text-align: center; border: 1px solid var(--border); }
    .countdown-value { font-size: var(--text-4xl); font-weight: var(--font-bold); color: var(--primary); line-height: 1; }
    .countdown-label { font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-2); text-transform: uppercase; }
    @media (max-width: 480px) { .countdown { grid-template-columns: repeat(2, 1fr); } }
  </style>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2'%3E%3Cpath d='M9 18V5l12-2v13'/%3E%3Ccircle cx='6' cy='18' r='3'/%3E%3Ccircle cx='18' cy='16' r='3'/%3E%3C/svg%3E">
</head>
<body>
  
  <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-8); background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);">
    <div style="text-align: center; max-width: 700px;">
      <div style="width: 100px; height: 100px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-2xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-8); border: 1px solid rgba(255,255,255,0.2);">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
      </div>
      
      <span style="display: inline-block; padding: var(--space-2) var(--space-4); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-full); color: rgba(255,255,255,0.8); font-size: var(--text-sm); font-weight: var(--font-medium); margin-bottom: var(--space-6);">Coming Soon</span>
      
      <h1 style="font-size: clamp(var(--text-4xl), 8vw, var(--text-6xl)); color: white; margin-bottom: var(--space-4);">Something Amazing<br>Is Coming</h1>
      <p style="color: rgba(255,255,255,0.8); font-size: var(--text-lg); margin-bottom: var(--space-10);">We're working hard to bring you an incredible new experience. Stay tuned for updates!</p>
      
      <!-- Countdown -->
      <div class="countdown">
        <div class="countdown-item">
          <div class="countdown-value" style="color: var(--primary);">15</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" style="color: var(--primary);">08</div>
          <div class="countdown-label">Hours</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" style="color: var(--primary);">42</div>
          <div class="countdown-label">Minutes</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" style="color: var(--primary);">30</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>
      
      <!-- Newsletter -->
      <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-2xl); padding: var(--space-8); border: 1px solid rgba(255,255,255,0.2);">
        <h3 style="color: white; margin-bottom: var(--space-2);">Get Notified</h3>
        <p style="color: rgba(255,255,255,0.7); margin-bottom: var(--space-6);">Subscribe to be the first to know when we launch</p>
        <form style="display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center;">
          <input type="email" class="form-input" placeholder="Enter your email" required style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white; min-width: 250px;">
          <button type="submit" class="btn btn-white">Notify Me</button>
        </form>
      </div>
      
      <!-- Social Links -->
      <div style="display: flex; gap: var(--space-3); justify-content: center; margin-top: var(--space-8);">
        <a href="#" style="width: 48px; height: 48px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.2); transition: all var(--transition-fast);" aria-label="Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
          </svg>
        </a>
        <a href="#" style="width: 48px; height: 48px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.2);" aria-label="Instagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          </svg>
        </a>
        <a href="#" style="width: 48px; height: 48px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.2);" aria-label="Twitter">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
          </svg>
        </a>
      </div>
      
      <p style="color: rgba(255,255,255,0.5); margin-top: var(--space-8); font-size: var(--text-sm);">
        <a href="index.html" style="color: rgba(255,255,255,0.7);">â† Back to Homepage</a>
      </p>
    </div>
  </main>
  
  <script src="../assets/js/main.js"></script>
</body>
</html>
